spring:
  application:
    name: oj-backend
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  session:
    timeout: 2592000
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/yuoj?characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 136828www
  ai:
    dashscope:
      api-key: 89fd0b23909d43809e5ffc3df4ca3445
      chat:
        options:
          model: qwen-max
          # temperature: 0.2
  servlet:
    multipart:
      max-file-size: 10MB

server:
  address: 0.0.0.0
  port: 50000
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value: 0

knife4j:
  enable: true
  openapi:
    title: "API Docs"
    version: 1.0
    group:
      default:
        api-rule: package
        api-rule-resources:
          - com.baimao.oj.controller
          - com.baimao.oj.ai.controller

codesandbox:
  type: remote
  url: http://localhost:8888/executeCode

ai:
  enabled: true
  retention-days: 30
  request-timeout-ms: 30000
  max-history-messages: 20
  default-provider: dashscope
  default-model-name: ${DASHSCOPE_MODEL:qwen-max}
  default-base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com}
  default-api-key: ${DASHSCOPE_API_KEY:}
  refuse-message: Sorry, I cannot directly provide full AC-ready solution code. I can help with ideas, debugging, and optimization.
  security-secret-key: oj-ai-secret-key
  archive-cron: "0 0/30 * * * ?"

