spring:
  session:
    timeout: 2592000
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://mysql:3306/${MYSQL_DB:oj}?characterEncoding=utf8&serverTimezone=GMT%2B8&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:123456}
      timeout: 3000ms
  # RabbitMQ 用于可靠异步同步比赛排行榜快照
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        # 排行榜快照消费者手动确认，写库成功后 ack，写库失败后 nack 进入死信队列
        acknowledge-mode: manual
        default-requeue-rejected: false
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:sk-89fd0b23909d43809e5ffc3df4ca3445}
      chat:
        options:
          model: ${DASHSCOPE_MODEL:qwen3-max-2025-09-23}
          temperature: 0.2

codesandbox:
  type: remote
  url: ${CODESANDBOX_URL:http://codesandbox:50001/executeCode}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      access: unrestricted
