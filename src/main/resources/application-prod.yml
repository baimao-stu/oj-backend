spring:
  application:
    name: oj-backend
  config:
    activate:
      on-profile: prod
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  session:
    timeout: 2592000
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://120.76.250.225:3306/yuoj?characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: baimao
    password: sztu@2078
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      chat:
        options:
          model: ${DASHSCOPE_MODEL:qwen-plus}
          temperature: 0.2
  servlet:
    multipart:
      max-file-size: 10MB

server:
  address: 0.0.0.0
  port: 50000
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: ""
  global-config:
    db-config:
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value: 0

knife4j:
  enable: true
  openapi:
    title: "API Docs"
    version: 1.0
    group:
      default:
        api-rule: package
        api-rule-resources:
          - com.baimao.oj.controller
          - com.baimao.oj.ai.controller

codesandbox:
  type: remote
  url: http://120.76.250.225:50001/executeCode

ai:
  enabled: true
  retention-days: 30
  request-timeout-ms: 30000
  max-history-messages: 20
  default-provider: dashscope
  default-model-name: ${DASHSCOPE_MODEL:qwen-plus}
  default-base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com}
  default-api-key: ${DASHSCOPE_API_KEY:}
  refuse-message: Sorry, I cannot directly provide full AC-ready solution code. I can help with ideas, debugging, and optimization.
  security-secret-key: oj-ai-secret-key
  archive-cron: "0 0/30 * * * ?"
