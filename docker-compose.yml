version: '1.0'
services:
  # mysql 容器
  mysql:
    image: mysql:8.0 # 使用的镜像
    container_name: mysql # 启动的实例名称
    environment:
      MYSQL_ROOT_PASSWORD: 123456 # root 用户密码
      MYSQL_DATABASE: oj         # 你原来的库名
      TZ: Asia/Shanghai       # 设置时区，避免时区问题导致的时间不正确
    ports:
      - "3306:3306" # 端口映射
    volumes:
      - ./mysql/data:/var/lib/mysql # 将数据目录挂载到本地目录以进行持久化
      - ./mysql/init:/docker-entrypoint-initdb.d # 启动脚本
    restart: always # 崩溃后自动重启
    networks:
      - mynetwork # 指定网络

  # redis 容器
  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data
    command: redis-server --appendonly yes --requirepass 123456
    networks:
      - mynetwork # 指定网络

  # 后端容器
  backend:
    container_name: backend
    build: ./backend
    ports:
      - "50000:50000"
    networks:
      - mynetwork
    depends_on:
      - mysql
      - redis
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CODESANDBOX_URL: http://120.79.237.184:50001/executeCode
      MYSQL_HOST: mysql
      MYSQL_DB: oj
      MYSQL_USER: root
      MYSQL_PASSWORD: 123456
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: 123456

  # codesandbox 容器
#  codesandbox:
#    build: ./codesandbox
#    container_name: codesandbox
#    restart: always
#    ports:
#      - "50001:50001"
#    environment:
#      SPRING_PROFILES_ACTIVE: prod
#    networks:
#      - mynetwork # 指定网络

  # nginx 容器（包含前端 dist）
  frontend:
    build: ./frontend
    container_name: frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - mynetwork # 指定网络

networks:
  mynetwork:
